{% extends 'layout.html' %}
{% block content %}
    <div class="container">
        <div style="margin-bottom:10px">
            <a href="http://127.0.0.1:8000/admin/add/" class="btn btn-primary">添加管理员</a>
        </div>

        <div class="panel panel-default">
            <div class="panel panel-default">
                <div class="panel-heading col-lg-6">
                    <span class="glyphicon glyphicon-list" aria-hidden="true"></span>
                    管理员列表
                </div>
                <div class="col-lg-6">
                    <form action="" method="get">
                        <div class="input-group" style="margin-top:5px">
                            <input name='q' type="text" class="form-control" placeholder="Search for..." value="{{ search_data }}">
                            <span class="input-group-btn">
                        <button class="btn btn-default" type="submit"><span class="glyphicon glyphicon-search" aria-hidden="true"></span></button>
                        </span>
                        </div>
                    </form>
                </div>
                <div class="panel-body">
                    <table class="table table-bordered">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>密码</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        {% for item in queryset %}
                            <tr>
                                <th scope="row">{{ item.id }}</th>
                                <td>{{ item.username }}</td>
                                <td>{{ item.password}}</td>
                                <td>
                                    <a href="http://127.0.0.1:8000/admin/{{ item.id }}/edit/" class="btn btn-primary btn-xs">编辑</a>
                                    <a href="http://127.0.0.1:8000/user/{{ item.id }}/delete/" class="btn btn-danger btn-xs">删除</a>
                                    <a href="http://127.0.0.1:8000/admin/{{ item.id }}/reset/" class="btn btn-warning btn-xs">重置密码</a>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <ul class="pagination">
                {{ page_string }}
            </ul>
        </div>
    </div>
{% endblock %}
