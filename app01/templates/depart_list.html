{% extends 'layout.html' %}
{% block content %}
    <div class="container">
        <div style="margin-bottom:10px">
            <a href="http://127.0.0.1:8000/depart/add/" class="btn btn-primary">添加部门</a>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">
                <span class="glyphicon glyphicon-list" aria-hidden="true"></span>
                部门列表
            </div>
            <div class="panel-body">
                <table class="table table-bordered">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    {% for item in queryset %}
                        <tr>
                            <th scope="row">{{ item.id }}</th>
                            <td>{{ item.title }}</td>
                            <td>
                                <a href="http://127.0.0.1:8000/depart/{{ item.id }}/edit/" class="btn btn-primary btn-xs">编辑</a>
                                <a href="http://127.0.0.1:8000/depart/delete/?nid={{ item.id }}" class="btn btn-danger btn-xs">删除</a>
                            </td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>

            <ul class="pagination">
                {{ page_string }}
            </ul>
        </div>
    </div>
{% endblock %}
