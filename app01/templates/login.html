{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="{% static 'plugins/bootstrap-3.4.1/css/bootstrap.css'%}" rel="stylesheet">
    <link href="{% static 'plugins/font-awesome-4.7.0/css/font-awesome.css' %}" rel="stylesheet">
    <style>
        .login{
            width:400px;
            margin:100px auto 0;
            padding:20px;
            border:1px solid;
            border-radius:10px;
            box-shadow:10px 10px 10px #aaa;
        }
        .login h1{
            text-align:center;
        }
    </style>
</head>
<body>
<div class="login" >
    <form method="post" novalidate>
        <div>
            <h1>用户登录</h1>
        </div>
        {% csrf_token %}
        {#      {% for item in form %}#}
        {#        <div class="form-group">#}
        {#          <label>{{ item.label }}</label>#}
        {#            {{ item }}#}
        {#        <span style="color:red">{{ item.errors.0 }}</span>#}
        {#        </div>#}
        {#      {% endfor %}#}
        <div class="form-group">
            <label>用户名</label>
            {{ form.username }}
            <span style="color:red">{{ form.username.errors.0 }}</span>
        </div>

        <div class="form-group">
            <label>密码</label>
            {{ form.password }}
            <span style="color:red">{{ form.password.errors.0 }}</span>
        </div>

        <div class="form-group">
            <label for="id_code">图片验证码</label>
            <div class="row">
                <div class="col-xs-7">
                    {{ form.code}}
                    <span style="color:red">{{ form.code.errors.0 }}</span>
                </div>
                <div class="col-xs-5">
                    <img id="image_code" src="http://127.0.0.1:8000/img/code/" style="width: 125px;">
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
    </form>
</div>
</body>
</html>
